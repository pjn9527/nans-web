server {
    listen 80;
    server_name panjiannan.site www.panjiannan.site;
    # 强制跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name panjiannan.site www.panjiannan.site;

    # === SSL 证书 ===
    ssl_certificate /etc/letsencrypt/live/www.panjiannan.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.panjiannan.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # === 1. 前端大厅 (静态文件) ===
    # 访问域名直接看这里
    location / {
        root /usr/share/nginx/html;
        index index.html;
        # 如果是单页应用(SPA)，找不到文件时返回 index.html，否则返回 404
        try_files $uri $uri/ /index.html; 
    }

    # === 2. Flask 后端 (API) ===
    # 只有 /api 开头的请求才找 Python
    location /api {
        proxy_pass http://flask-app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # === 3. Flask 后台管理 ===
    location /admin {
        proxy_pass http://flask-app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # === 4. Flask 认证模块 (新增！关键！) ===
    location /auth {
        proxy_pass http://flask-app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # === 5. Flask 静态文件 (后台样式) ===
    # Flask-Admin 需要的一些 CSS/JS
    location /static {
        proxy_pass http://flask-app:5000;
    }
}