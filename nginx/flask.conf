server {
    listen 80;
    server_name panjiannan.site www.panjiannan.site;

    # =========================================================
    # 🚀 [新增] 拦截 Let's Encrypt (Certbot) 的 HTTP-01 验证请求
    # 必须在 301 跳转之前拦截，将验证文件导向指定的共享目录
    # =========================================================
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他正常请求依然强制跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name panjiannan.site www.panjiannan.site;

    # === SSL 证书 ===
    ssl_certificate /etc/letsencrypt/live/www.panjiannan.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.panjiannan.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # =========================================================
    # 🚀 [新增] Gzip 压缩加速 (性能核心)
    # 原理：在 Nginx 发送数据给用户前，先打包压缩。
    # 效果：能把 1MB 的 JS 文件压到 200KB，传输速度提升 5 倍！
    # =========================================================
    gzip on;
    gzip_min_length 1k;       # 小于 1k 的文件不压缩 (没必要)
    gzip_comp_level 6;        # 压缩级别 (1-9)，6 是 CPU 消耗和压缩率的最佳平衡点
    # 压缩以下类型的文件 (包含 JS, CSS, JSON, SVG 等)
    gzip_types text/plain text/css text/javascript application/javascript application/x-javascript application/json application/xml image/svg+xml;
    gzip_vary on;             # 告诉代理服务器缓存压缩版本
    gzip_disable "MSIE [1-6]\."; # 兼容老古董 IE 浏览器
    # =========================================================

    # === 反向代理设置 ===
    location / {
        # 转发给 Flask 容器
        proxy_pass http://flask-app:5000; 
        
        # 传递客户端真实 IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}