# === 第一部分：HTTP 自动跳转 HTTPS ===
server {
    listen 80;
    server_name panjiannan.site www.panjiannan.site;

    # 强制将所有 http 请求跳转到 https
    location / {
        return 301 https://$host$request_uri;
    }
}

# === 第二部分：HTTPS 主配置 ===
server {
    listen 443 ssl;
    server_name panjiannan.site www.panjiannan.site;

    # === SSL 证书路径 (必须与服务器实际路径一致) ===
    ssl_certificate /etc/letsencrypt/live/panjiannan.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/panjiannan.site/privkey.pem;

    # SSL 安全优化参数
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # === 核心规则：全部转发给 Flask ===
    # 因为你的网站是 Flask 渲染的，所以要把 "/" 交给 Python 处理
    location / {
        # 注意：这里的 flask-app 必须和你 docker-compose.yml 里的服务名一致
        # 如果你之前叫 my-backend，这里也要改成 my-backend
        proxy_pass http://flask-app:5000;
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # === 静态文件优化 (可选) ===
    # 让 Nginx 直接处理 css/js/img，不经过 Python，速度更快
    location /static {
        alias /app/app/static;
        expires 30d;
    }

    # === AI Bartender 预留位 (先注释掉) ===
    # 等以后你做好了 bartender 的独立前端，再把下面解开
    # location /bartender {
    #     alias /var/www/bartender;
    #     index index.html;
    # }
}