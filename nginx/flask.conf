server {
    listen 80;
    server_name panjiannan.site www.panjiannan.site;
    # 强制跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name panjiannan.site www.panjiannan.site;

    # === SSL 证书 (保持不变) ===
    ssl_certificate /etc/letsencrypt/live/www.panjiannan.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.panjiannan.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # =========================================================
    # 👇 核心修改：统一转发给 Flask
    # 不再区分 /api 或 /admin，所有请求都给 Flask (Gunicorn)
    # 因为现在的 Flask 既要渲染 HTML (Jinja2)，又要处理 API
    # =========================================================
    location / {
        # 这里的 flask-app 必须和你 docker-compose.yml 里的服务名一致
        # 如果你的服务名是 web，这里就改成 http://web:5000
        proxy_pass http://flask-app:5000; 
        
        # 传递客户端真实 IP 给 Flask (防刷赞、日志记录必需)
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}