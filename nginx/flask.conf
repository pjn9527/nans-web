server {
    listen 80;
    server_name panjiannan.site www.panjiannan.site; [cite: 12]

    # =========================================================
    # 🚀 [新增] 拦截 Let's Encrypt (Certbot) 的 HTTP-01 验证请求
    # 必须放在 301 跳转之前
    # =========================================================
    location /.well-known/acme-challenge/ { [cite: 13]
        root /var/www/certbot;
    } [cite: 14]

    # 其他正常请求依然强制跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    } [cite: 14, 15]
}

server {
    listen 443 ssl;
    server_name panjiannan.site www.panjiannan.site; [cite: 15, 16]

    # === SSL 证书 ===
    ssl_certificate /etc/letsencrypt/live/www.panjiannan.site/fullchain.pem; [cite: 16]
    ssl_certificate_key /etc/letsencrypt/live/www.panjiannan.site/privkey.pem; [cite: 16]
    ssl_protocols TLSv1.2 TLSv1.3; [cite: 16]
    ssl_ciphers HIGH:!aNULL:!MD5; [cite: 16]

    # === Gzip 压缩 ===
    gzip on; [cite: 17]
    gzip_min_length 1k; [cite: 17]
    gzip_comp_level 6; [cite: 17]
    gzip_types text/plain text/css text/javascript application/javascript application/x-javascript application/json application/xml image/svg+xml; [cite: 18]
    gzip_vary on; [cite: 18]
    gzip_disable "MSIE [1-6]\."; [cite: 18]

    # === 核心业务反向代理 ===
    location / { [cite: 19]
        proxy_pass http://flask-app:5000; [cite: 19]
        proxy_set_header Host $host; [cite: 20]
        proxy_set_header X-Real-IP $remote_addr; [cite: 20]
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; [cite: 20]
        proxy_set_header X-Forwarded-Proto $scheme; [cite: 20]
    } [cite: 21]

    # =========================================================
    # --- TV to MT5 Bridge & Polymarket Routes (固定到代码库) ---
    # =========================================================
    location /tv-webhook { [cite: 21]
        proxy_pass http://172.17.0.1:8000; [cite: 21]
        proxy_set_header Host $host; [cite: 22]
        proxy_set_header X-Real-IP $remote_addr; [cite: 22]
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; [cite: 22]

        # [核心防御]：强制关闭 Nginx 代理缓冲，防止 Webhook 积压
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }

    location /sync-history { [cite: 22]
        proxy_pass http://172.17.0.1:8000; [cite: 22]
        proxy_set_header Host $http_host; [cite: 23]
        proxy_set_header X-Real-IP $remote_addr; [cite: 23]

        # [核心防御]：强制关闭缓冲，保障历史大数据包顺畅下发
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    }
    
    location /mt5-data { [cite: 23]
        access_log off; # 关闭高频轮询日志 [cite: 23, 24]
        proxy_pass http://172.17.0.1:8000; [cite: 24]
        proxy_set_header Host $host; [cite: 24]
        proxy_set_header X-Real-IP $remote_addr; [cite: 24]
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; [cite: 24]

        # [核心防御]：强制关闭缓冲，保障下行数据秒级触达
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
    } 
}