server {
    listen 80;
    server_name localhost;

    # === 前端规则 ===
# 1. 大厅 (现有逻辑不变)
    location / {
        root /usr/share/nginx/html;
        index index.html;
    }

    # 2. 【新增】AI Bartender 专属入口
    # 只要用户访问 /bartender，Nginx 就会去 bartender 文件夹找 index.html
    location /bartender {
        root /usr/share/nginx/html;
        index index.html;
    }

    # === 后端规则 ===
    # 所有以 /api 开头的请求，转发给 flask-app 容器的 5000 端口
    location /api {
        proxy_pass http://flask-app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 后台管理页面也要转发
    location /admin {
        proxy_pass http://flask-app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
    
    # 后台需要的静态资源（CSS/JS）
    location /static {
        proxy_pass http://flask-app:5000;
    }
}