server {
    listen 80;
    server_name panjiannan.site www.panjiannan.site;

    # =========================================================
    # 🚀 [新增] 拦截 Let's Encrypt (Certbot) 的 HTTP-01 验证请求
    # 必须放在 301 跳转之前
    # =========================================================
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 其他正常请求依然强制跳转 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name panjiannan.site www.panjiannan.site;

    # === SSL 证书 ===
    ssl_certificate /etc/letsencrypt/live/www.panjiannan.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.panjiannan.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # === Gzip 压缩 ===
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/javascript application/javascript application/x-javascript application/json application/xml image/svg+xml;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # === 核心业务反向代理 ===
    location / {
        proxy_pass http://flask-app:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # =========================================================
    # --- TV to MT5 Bridge & Polymarket Routes (固定到代码库) ---
    # =========================================================
    location /tv-webhook {
        proxy_pass http://172.17.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /sync-history {
        proxy_pass http://172.17.0.1:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
    }
    
    location /mt5-data {
        access_log off; # 关闭高频轮询日志
        proxy_pass http://172.17.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}