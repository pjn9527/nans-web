services:
  # 服务 1: Flask 后端
  flask-app:
    build: .
    container_name: my-backend
    restart: always
    # 👇 【修改点1】不再写死密钥，改为读取 .env 文件
    # 这样服务器上就会用服务器的密钥，本地用本地的
    env_file:
      - .env
    volumes:
      - ./app.db:/app/app.db   # 数据库持久化
      - ./:/app                # 实时代码映射
    expose:
      - "5000"

  # 服务 2: Nginx 前端 + 反向代理
  nginx:
    image: nginx:alpine
    container_name: my-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"  # 👈 【修改点2】必须开启 HTTPS 端口！
    volumes:
      # 1. 挂载 Nginx 配置文件
      - ./nginx/flask.conf:/etc/nginx/conf.d/default.conf
      
      # 2. 👇 【修改点3】挂载 HTTPS 证书 (关键！)
      # 只读模式 (:ro) 挂载，保证安全
      - /etc/letsencrypt:/etc/letsencrypt:ro
      
      # 3. 👇 【修改点4】静态文件映射
      # 为了让 Nginx 能处理静态图片/CSS，需要把 flask 的 static 文件夹也给它看一眼
      - ./app/static:/app/app/static
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - flask-app